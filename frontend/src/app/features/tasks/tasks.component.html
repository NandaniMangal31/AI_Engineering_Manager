<div class="flex min-h-screen flex-1 flex-col bg-slate-50">
  <!-- Top bar -->
  <header class="flex items-center justify-between border-b border-slate-200 bg-white px-8 py-4">
    <div class="flex items-center gap-2 text-lg">
      <span class="font-bold text-blue-700">Tasks</span>
      <span class="text-slate-300">/</span>
      <span class="text-slate-500">Project Alpha</span>
      <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" /></svg>
    </div>
    <div class="flex items-center gap-4">
      <div class="relative">
        <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
        <input
          type="text"
          placeholder="Search tasks, PRs, or team..."
          class="w-72 rounded-lg border border-slate-200 bg-slate-50 py-2 pl-9 pr-3 text-sm focus:border-blue-500 focus:outline-none"
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        />
      </div>
      <button type="button" class="relative text-slate-500 hover:text-slate-700" aria-label="Notifications">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10 21a2 2 0 0 0 4 0" /></svg>
        <span class="absolute -top-0.5 -right-0.5 h-2 w-2 rounded-full bg-red-500"></span>
      </button>
    </div>
  </header>

  <main class="flex-1 p-8">
    <!-- Filters -->
    <div class="mb-6 flex flex-wrap items-center gap-3">
      <select
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-600"
        [ngModel]="memberFilter()"
        (ngModelChange)="memberFilter.set($event)"
      >
        <option value="all">All Members</option>
        @for (m of members(); track m._id) {
          <option [value]="m._id">{{ m.name }}</option>
        }
      </select>

      <select
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-600"
        [ngModel]="statusFilter()"
        (ngModelChange)="statusFilter.set($event)"
      >
        <option value="all">Status: All</option>
        <option [value]="TaskStatus.PROCESSING">In Progress</option>
        <option [value]="TaskStatus.BLOCKED">Blocked</option>
        <option [value]="TaskStatus.COMPLETED">Completed</option>
      </select>

      <select
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-600"
        [ngModel]="priorityFilter()"
        (ngModelChange)="priorityFilter.set($event)"
      >
        <option value="all">Priority: All</option>
        <option [value]="TaskPriority.CRITICAL">Urgent</option>
        <option [value]="TaskPriority.HIGH">High</option>
        <option [value]="TaskPriority.MEDIUM">Normal</option>
        <option [value]="TaskPriority.LOW">Low</option>
      </select>

      <button
        type="button"
        class="ml-auto flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" /></svg>
        Create Task
      </button>
    </div>

    <!-- Loading -->
    @if (loading()) {
      <app-skeleton-table [rows]="4" />
    } @else if (error()) {
      <app-error-state message="Couldn't load tasks from the server." (retry)="load()" />
    } @else {
      <div class="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <table class="w-full text-left">
          <thead class="border-b border-slate-200 bg-slate-50 text-xs font-semibold uppercase tracking-wide text-slate-500">
            <tr>
              <th class="cursor-pointer px-6 py-3" (click)="setSort('title')">Task Name</th>
              <th class="px-6 py-3">Assigned To</th>
              <th class="cursor-pointer px-6 py-3" (click)="setSort('priority')">Priority</th>
              <th class="cursor-pointer px-6 py-3" (click)="setSort('status')">Status</th>
              <th class="cursor-pointer px-6 py-3" (click)="setSort('deadline')">Due Date</th>
            </tr>
          </thead>
          <tbody>
            @for (row of filteredRows(); track row.task._id) {
              <app-task-row [row]="row" />
            } @empty {
              <tr>
                <td colspan="5" class="px-6 py-10 text-center text-sm text-slate-400">
                  No tasks match these filters.
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </main>
</div>
