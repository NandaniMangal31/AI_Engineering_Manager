<aside class="flex h-screen w-64 shrink-0 flex-col justify-between border-r border-slate-200 bg-slate-50 px-4 py-6">
  <div>
    <div class="px-2">
      <h1 class="text-xl font-bold text-blue-700">TaskStream AI</h1>
      <p class="mt-0.5 text-xs font-medium uppercase tracking-wide text-slate-400">
        {{ currentUser.role }}
      </p>
    </div>

    <nav class="mt-8 flex flex-col gap-1">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-blue-100 text-blue-700 font-semibold"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-slate-600 transition-colors hover:bg-slate-100"
        >
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @switch (item.icon) {
              @case ('dashboard') {
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              }
              @case ('tasks') {
                <rect x="4" y="4" width="16" height="16" rx="2" />
                <path d="M8 9h8M8 13h5" />
              }
              @case ('standup') {
                <rect x="4" y="4" width="16" height="14" rx="2" />
                <path d="M8 20l2-2M14 20l2-2" />
              }
              @case ('team') {
                <circle cx="9" cy="8" r="3" />
                <path d="M2 20c0-3.3 3-6 7-6s7 2.7 7 6" />
                <circle cx="17" cy="9" r="2.3" />
                <path d="M17.5 14c2.6.4 4.5 2.4 4.5 6" />
              }
            }
          </svg>
          {{ item.label }}
        </a>
      }
    </nav>
  </div>

  <div class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-3 py-3">
    <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-blue-600 text-sm font-semibold text-white">
      {{ currentUser.name.charAt(0) }}
    </div>
    <div class="min-w-0">
      <p class="truncate text-sm font-semibold text-slate-800">{{ currentUser.name }}</p>
      <p class="truncate text-xs text-slate-400">{{ currentUser.role }}</p>
    </div>
  </div>
</aside>
